{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="form-container">
  <h3>Create Account</h3>
  <form action="{{ url_for('register') }}" method="POST">
    <label for="nameReg">Name</label>
    <input type="text" id="nameReg" name="name" required />

    <label for="emailReg">Email</label>
    <input type="email" id="emailReg" name="email" required />

    <label for="passwordReg">Password</label>
    <input type="password" id="passwordReg" name="password" required />

    <label for="passwordReReg">Re-enter Password</label>
    <input type="password" id="passwordReReg" name="password_re" required />

    <button type="submit" class="btn">Register</button>
  </form>
  <div class="links">
    <a href="{{ url_for('login') }}">Back to Login</a>
  </div>
</div>
{% endblock %}
